</head>

<nav class="navbar navbar-expand-lg bg-body-tertiary"  data-bs-theme="dark">
  <div class="container-fluid">
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

      <ul class="navbar-nav">

<!-- Tabla -->
<div class="container mt-4">
    <h1>Alumno</h1>
    <hr>

    <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#ModalAgregarAlumno">
        Agregar
    </button>

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Id</th>
                <th>Nombre</th>
                <th>Dni</th>
                <th>Nota</th>
                <th></th>
                <th></th>
            </tr>
        </thead>
        <tbody id="TodosLosAlumnos"></tbody>
    </table>
</div>

<!-- Modal Crear -->
<div id="ModalAgregarAlumno" class="modal fade" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Agregar Alumno</h5>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" id="Nombre" class="form-control" placeholder="Nombre">
        </div>

        <div class="mb-3">
          <label class="form-label">Dni</label>
          <input type="text" id="Dni" class="form-control" placeholder="Dni">
        </div>

        <div class="mb-3">
          <label class="form-label">Nota</label>
          <input type="email" id="Nota" class="form-control" placeholder="Nota">
        </div>

        <p id="error" hidden class="text-danger"></p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="CrearAlumno()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- Modal Editar -->
<div id="ModalEditarAlumno" class="modal fade" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Alumno</h5>
      </div>

      <div class="modal-body">
        <input type="hidden" id="IdAlumnoEditar">

        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" id="NombreEditar" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Dni</label>
          <input type="number" id="DniEditar" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Nota</label>
          <input type="number" id="NotaEditar" class="form-control">
        </div>


        <p id="erroreditar" hidden class="text-danger"></p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="EditarAlumno()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/Alumno.js"></script>

<script>
    window.onload = ObtenerAlumnos;
</script>

</body>
